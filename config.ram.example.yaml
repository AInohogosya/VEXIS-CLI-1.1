# VEXIS-CLI RAM Management Configuration Example
# Copy this file to config.yaml and customize as needed

# RAM Management Settings
ram:
  # Maximum RAM usage percentage before blocking commands (default: 70.0)
  max_usage_percentage: 70.0
  
  # RAM usage percentage to resume operations after auto-pause (default: 35.0)
  resume_percentage: 35.0
  
  # How often to check RAM usage in seconds (default: 1.0)
  check_interval: 1.0
  
  # Enable automatic pause/resume when RAM limits are exceeded (default: true)
  enable_auto_pause: true
  
  # Enable command execution restrictions based on RAM usage (default: true)
  enable_command_limits: true

# Engine Configuration (existing)
engine:
  command_timeout: 30
  task_timeout: 300
  max_iterations: 500

# Logging Configuration (existing)
logging:
  level: "INFO"
  console: true
  json_format: false

# API Configuration (existing)
api:
  timeout: 30
  max_retries: 3
  retry_delay: 1.0

# Example RAM Management Scenarios:

# 1. Conservative Settings (for systems with limited RAM)
# ram:
#   max_usage_percentage: 60.0
#   resume_percentage: 30.0
#   check_interval: 0.5

# 2. Aggressive Settings (for systems with abundant RAM)
# ram:
#   max_usage_percentage: 85.0
#   resume_percentage: 40.0
#   check_interval: 2.0

# 3. Disable Auto-Pause (only block commands)
# ram:
#   max_usage_percentage: 75.0
#   enable_auto_pause: false
#   enable_command_limits: true

# 4. Disable All RAM Management (not recommended)
# ram:
#   enable_auto_pause: false
#   enable_command_limits: false
